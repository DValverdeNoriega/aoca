document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

op */\n  --bg: #080510;            /* deep violet-tinted black. Never flat #000 */\n  --bg-2: #0d091a;          /* gradient partner for the backdrop */\n\n  /* Surfaces */\n  --panel: #160f29;         /* cards, sidebar */\n  --panel-2: #1d1536;       /* raised surfaces, chat bubbles */\n  --line: #2b2247;          /* hairline borders */\n\n  /* Text */\n  --text: #FFFFFF;          /* primary text (20.2:1) */\n  --muted: #9388b0;         /* secondary text */\n\n  /* Violet — AOCA's voice. PRIMARY ACCENT. Sourced from the brand SVGs. */\n  --violet: #A78BFA;        /* primary accent (7.4:1 on --bg, AA) */\n  --violet-bright: #C4B5FD; /* hover, emphasis, the signature spark (10.9:1) */\n  --violet-deep: #7a52d4;   /* button fills ONLY — never text (3.8:1) */\n\n  /* Lime — what the STUDENT achieves. Success only. Never a surface. */\n  --lime: #C9F25A;          /* 15.7:1 — progress, correct answer, key stat */\n\n  /* ---- Semantic aliases ---- */\n  --surface-page: var(--bg);\n  --surface-card: var(--panel);\n  --surface-raised: var(--panel-2);\n  --border-hairline: var(--line);\n\n  --text-primary: var(--text);\n  --text-secondary: var(--muted);\n  --text-accent: var(--violet);\n\n  --accent: var(--violet);\n  --accent-hover: var(--violet-bright);\n  --accent-fill: var(--violet-deep);\n  --success: var(--lime);\n\n  --focus-ring: var(--violet-bright);\n}\n<\u002Fstyle>\n  <style>/* AOCA — Spacing & sizing tokens. Loose 8px-ish rhythm, generous. */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* Container widths */\n  --content-max: 1080px;\n  --prose-max: 680px;\n\n  /* Control sizes — hit targets never below 44px */\n  --control-h: 44px;\n  --control-h-sm: 36px;\n  --control-h-lg: 52px;\n}\n<\u002Fstyle>\n  <style>/* AOCA — Form, motion & effect tokens.\n   Rounded 10–14px. Hairline 1px --line borders. No heavy shadows.\n   No gradients on buttons/cards — gradients belong to the backdrop only. */\n:root {\n  /* Radii */\n  --radius-sm: 10px;\n  --radius: 12px;\n  --radius-lg: 14px;\n  --radius-pill: 999px;\n\n  /* Borders */\n  --border: 1px solid var(--line);\n  --border-accent: 1px solid var(--violet);\n\n  /* Soft ambient elevation — depth from tone, never a dark drop shadow */\n  --shadow-soft: 0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 30px rgba(0,0,0,0.35);\n  --glow-violet: 0 0 0 1px var(--line), 0 8px 40px rgba(122,82,212,0.18);\n\n  /* The backdrop nebula — soft overlapping radial violets over near-black */\n  --backdrop:\n    radial-gradient(1100px 700px at 78% -8%, rgba(122,82,212,0.20), transparent 60%),\n    radial-gradient(900px 620px at 12% 108%, rgba(179,147,245,0.12), transparent 55%),\n    radial-gradient(700px 700px at 50% 40%, rgba(29,21,54,0.55), transparent 70%),\n    linear-gradient(160deg, var(--bg-2), var(--bg)); /* @kind other */\n\n  /* Motion — slow, ambient. Nothing bounces, nothing pops. */\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --dur-fast: 140ms;     /* @kind other */\n  --dur: 240ms;          /* @kind other */\n  --dur-slow: 520ms;     /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* AOCA Design System — global entry point. Consumers link this one file.\n   Keep this as @import lines only. */\n/* vietnamese */\n@font-face {\n  font-family: 'Bricolage Grotesque';\n  font-style: normal;\n  font-weight: 300 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"1d7a36a3-e8ec-4407-839d-e57592874106\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Bricolage Grotesque';\n  font-style: normal;\n  font-weight: 300 800;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"32f97da0-b0df-4655-9590-48043f954bb8\") format('woff2 301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8d8f217d-82aa-44f5-8290-e3ba09f524a2\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2ff6120d-0058-4ae2-9f82-e1189d290fbb\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"b86bb306-9864-4d6e-9cee-64cb790e5cc4\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'JetBrains Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a919a4c2-68eb-480e-a3f4-988f62b885c6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* AOCA — Typography tokens.\n   Display: Bricolage Grotesque (headings, wordmark, section titles)\n   UI/body: Inter (400/500/600 only)\n   Utility: JetBrains Mono (eyebrows, stats, ALL math)\n   No script, cursive, handwritten, or italic display type. */\n:root {\n  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;\n  --font-ui: 'Inter', system-ui, sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, monospace;\n\n  /* Weights */\n  --w-regular: 400;      /* @kind other */\n  --w-medium: 500;       /* @kind other */\n  --w-semibold: 600;     /* @kind other */\n  --w-display: 700;      /* @kind other */\n  --w-display-heavy: 800; /* @kind other */\n\n  /* Type scale — generous, built for classroom projection */\n  --fs-eyebrow: 0.75rem;   /* 12px, mono uppercase, tracked */\n  --fs-caption: 0.8125rem; /* 13px */\n  --fs-body-sm: 0.9375rem; /* 15px */\n  --fs-body: 1.0625rem;    /* 17px */\n  --fs-body-lg: 1.25rem;   /* 20px */\n  --fs-h4: 1.5rem;         /* 24px */\n  --fs-h3: 2rem;           /* 32px */\n  --fs-h2: 2.75rem;        /* 44px */\n  --fs-h1: 3.75rem;        /* 60px */\n  --fs-display: 5.5rem;    /* 88px, hero/portada */\n\n  /* Line heights */\n  --lh-tight: 1.05;      /* @kind other */\n  --lh-heading: 1.15;    /* @kind other */\n  --lh-body: 1.6;        /* @kind other */\n\n  /* Tracking */\n  --tracking-eyebrow: 0.18em;  /* uppercase mono labels */\n  --tracking-tight: -0.02em;   /* large display */\n}\n\n/* AOCA — Color tokens. Exact values, do not adjust. */\n:root {\n  /* Backdrop */\n  --bg: #080510;            /* deep violet-tinted black. Never flat #000 */\n  --bg-2: #0d091a;          /* gradient partner for the backdrop */\n\n  /* Surfaces */\n  --panel: #160f29;         /* cards, sidebar */\n  --panel-2: #1d1536;       /* raised surfaces, chat bubbles */\n  --line: #2b2247;          /* hairline borders */\n\n  /* Text */\n  --text: #FFFFFF;          /* primary text (20.2:1) */\n  --muted: #9388b0;         /* secondary text */\n\n  /* Violet — AOCA's voice. PRIMARY ACCENT. Sourced from the brand SVGs. */\n  --violet: #A78BFA;        /* primary accent (7.4:1 on --bg, AA) */\n  --violet-bright: #C4B5FD; /* hover, emphasis, the signature spark (10.9:1) */\n  --violet-deep: #7a52d4;   /* button fills ONLY — never text (3.8:1) */\n\n  /* Lime — what the STUDENT achieves. Success only. Never a surface. */\n  --lime: #C9F25A;          /* 15.7:1 — progress, correct answer, key stat */\n\n  /* ---- Semantic aliases ---- */\n  --surface-page: var(--bg);\n  --surface-card: var(--panel);\n  --surface-raised: var(--panel-2);\n  --border-hairline: var(--line);\n\n  --text-primary: var(--text);\n  --text-secondary: var(--muted);\n  --text-accent: var(--violet);\n\n  --accent: var(--violet);\n  --accent-hover: var(--violet-bright);\n  --accent-fill: var(--violet-deep);\n  --success: var(--lime);\n\n  --focus-ring: var(--violet-bright);\n}\n\n/* AOCA — Spacing & sizing tokens. Loose 8px-ish rhythm, generous. */\n:root {\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n\n  /* Container widths */\n  --content-max: 1080px;\n  --prose-max: 680px;\n\n  /* Control sizes — hit targets never below 44px */\n  --control-h: 44px;\n  --control-h-sm: 36px;\n  --control-h-lg: 52px;\n}\n\n/* AOCA — Form, motion & effect tokens.\n   Rounded 10–14px. Hairline 1px --line borders. No heavy shadows.\n   No gradients on buttons/cards — gradients belong to the backdrop only. */\n:root {\n  /* Radii */\n  --radius-sm: 10px;\n  --radius: 12px;\n  --radius-lg: 14px;\n  --radius-pill: 999px;\n\n  /* Borders */\n  --border: 1px solid var(--line);\n  --border-accent: 1px solid var(--violet);\n\n  /* Soft ambient elevation — depth from tone, never a dark drop shadow */\n  --shadow-soft: 0 1px 0 rgba(255,255,255,0.02) inset, 0 8px 30px rgba(0,0,0,0.35);\n  --glow-violet: 0 0 0 1px var(--line), 0 8px 40px rgba(122,82,212,0.18);\n\n  /* The backdrop nebula — soft overlapping radial violets over near-black */\n  --backdrop:\n    radial-gradient(1100px 700px at 78% -8%, rgba(122,82,212,0.20), transparent 60%),\n    radial-gradient(900px 620px at 12% 108%, rgba(179,147,245,0.12), transparent 55%),\n    radial-gradient(700px 700px at 50% 40%, rgba(29,21,54,0.55), transparent 70%),\n    linear-gradient(160deg, var(--bg-2), var(--bg)); /* @kind other */\n\n  /* Motion — slow, ambient. Nothing bounces, nothing pops. */\n  --ease: cubic-bezier(0.22, 0.61, 0.36, 1); /* @kind other */\n  --dur-fast: 140ms;     /* @kind other */\n  --dur: 240ms;          /* @kind other */\n  --dur-slow: 520ms;     /* @kind other */\n}\n\n<\u002Fstyle>\n  <style>/* latin-ext */\n@font-face {\n  font-family: 'Atkinson Hyperlegible';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"31d45f72-e7f1-4592-a143-6fb19b056836\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Atkinson Hyperlegible';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"aa6e20c3-21a8-4fc1-92f8-f0d4ee56071d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Atkinson Hyperlegible';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"980dcf5c-5826-426c-9e45-bd1b8d49db34\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Atkinson Hyperlegible';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"08ff994c-843e-4b47-852a-839915a3a09a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <script src=\"6e55795c-f94d-43ac-ba5a-a56da3  actividad }}\" as=\"act\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex;align-items:flex-start;gap:10px\">\n                    <sc-if value=\"{{ act.done }}\" hint-placeholder-val=\"{{ true }}\">\n                      <span style=\"flex:none;color:var(--lime);font-weight:700;line-height:1.5;font-size:15px\">✓<\u002Fspan>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ act.pending }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"flex:none;color:var(--muted);line-height:1.5;font-size:15px\">·<\u002Fspan>\n                    <\u002Fsc-if>\n                    <span class=\"aoca-readable\" style=\"font-size:14px;color:var(--text);line-height:1.5\">{{ act.text }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n            <\u002Fx-import>\n\n            <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Card\" accent=\"{{ true }}\" hint-size=\"100%,auto\">\n              <div style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)\">Tip del día<\u002Fdiv>\n              <p class=\"aoca-readable\" style=\"font-size:15px;line-height:1.6;color:var(--text);margin:12px 0 0\">{{ tip }}<\u002Fp>\n            <\u002Fx-import>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:auto;padding-top:34px\">\n            <div style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:14px\">Temas de {{ subjectName }}<\u002Fdiv>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px\">\n              <sc-for list=\"{{ chips }}\" as=\"chip\" hint-placeholder-count=\"4\">\n                <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Chip\" sc-camel-on-click=\"{{ chip.onClick }}\" hint-size=\"auto,36px\"><span class=\"aoca-readable\">{{ chip.label }}<\u002Fspan><\u002Fx-import>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ started }}\" hint-placeholder-val=\"{{ false }}\">\n        <div ref=\"{{ threadRef }}\" style=\"flex:1;min-height:0;overflow-y:auto;padding:24px 24px 8px\">\n          <div aria-live=\"polite\" style=\"max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:14px\">\n            <div style=\"display:flex;align-items:baseline;gap:10px;margin-bottom:2px\">\n              <span style=\"font-family:var(--font-display);font-weight:700;font-size:18px\">{{ topicLabel }}<\u002Fspan>\n              <span style=\"font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)\">{{ subjectName }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"2\">\n              <div style=\"display:flex;gap:10px;align-items:flex-start;width:100%\">\n                <sc-if value=\"{{ m.showAvatar }}\" hint-placeholder-val=\"{{ true }}\">\n                  <span style=\"flex:none;width:32px;height:32px;margin-top:2px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;display:grid;place-items:center;overflow:hidden\">\n                    <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Logo\" variant=\"bicolor\" size=\"{{ n26 }}\" hint-size=\"26px,26px\"><\u002Fx-import>\n                  <\u002Fspan>\n                <\u002Fsc-if>\n                <div style=\"flex:1;min-width:0\">\n                  <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.ChatBubble\" dc-props=\"{{ m.bubbleProps }}\" hint-size=\"100%,auto\">\n                    <span class=\"aoca-readable aoca-bubbletext\">{{ m.text }}<\u002Fspan>\n                    <sc-if value=\"{{ m.eq }}\" hint-placeholder-val=\"{{ false }}\">\n                      <span style=\"display:block;margin-top:8px;font-family:var(--font-mono);font-size:15px;color:var(--text);letter-spacing:.01em\">{{ m.eq }}<\u002Fspan>\n                    <\u002Fsc-if>\n                  <\u002Fx-import>\n                <\u002Fdiv>\n                <sc-if value=\"{{ m.canSpeak }}\" hint-placeholder-val=\"{{ false }}\">\n                  <button type=\"button\" sc-camel-on-click=\"{{ m.onSpeak }}\" aria-label=\"{{ m.speakLabel }}\" style=\"{{ m.speakStyle }}\" style-hover=\"{{ speakHover }}\">\n                    <sc-if value=\"{{ m.speaking }}\" hint-placeholder-val=\"{{ false }}\">\n                      <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"currentColor\" aria-hidden=\"true\"><rect x=\"6\" y=\"6\" width=\"12\" height=\"12\" rx=\"2\"><\u002Frect><\u002Fsvg>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ m.notSpeaking }}\" hint-placeholder-val=\"{{ true }}\">\n                      <svg width=\"18\" height=\"18\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M11 5 6 9H3v6h3l5 4V5z\"><\u002Fpath><path d=\"M15.5 8.5a5 5 0 0 1 0 7\"><\u002Fpath><path d=\"M18.5 6a9 9 0 0 1 0 12\"><\u002Fpath><\u002Fsvg>\n                    <\u002Fsc-if>\n                  <\u002Fbutton>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n\n            <sc-if value=\"{{ typing }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"display:flex;gap:10px;align-items:flex-start\">\n                <span style=\"flex:none;width:32px;height:32px;margin-top:2px;background:var(--panel-2);border:1px solid var(--line);border-radius:9px;display:grid;place-items:center;overflow:hidden\">\n                  <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Logo\" variant=\"bicolor\" size=\"{{ n26 }}\" hint-size=\"26px,26px\"><\u002Fx-import>\n                <\u002Fspan>\n                <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.TypingIndicator\" hint-size=\"64px,44px\"><\u002Fx-import>\n              <\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"flex:none;padding:12px 24px 20px;border-top:1px solid var(--line)\">\n        <div style=\"max-width:760px;margin:0 auto\">\n          <sc-if value=\"{{ started }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:12px\">\n              <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Button\" variant=\"secondary\" size=\"lg\" disabled=\"{{ answerDisabled }}\" sc-camel-on-click=\"{{ onAnswer }}\" dc-props=\"{{ answerExtra }}\" hint-size=\"auto,52px\">Esta es mi respuesta →<\u002Fx-import>\n              <button type=\"button\" sc-camel-on-click=\"{{ onHint }}\" disabled=\"{{ hintDisabled }}\" title=\"{{ hintTitle }}\" style=\"{{ hintStyle }}\" style-hover=\"{{ hintHover }}\">Dame una pista&nbsp;·&nbsp;<span style=\"color:var(--lime);font-family:var(--font-mono);font-weight:500\">{{ hintCount }} de {{ hintTotal }}<\u002Fspan><\u002Fbutton>\n              <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Button\" variant=\"ghost\" size=\"lg\" sc-camel-on-click=\"{{ onNoEntendi }}\" hint-size=\"auto,52px\">No entendí la pregunta<\u002Fx-import>\n              <x-import component-from-global-scope=\"AOCADesignSystem_6f70cc.Button\" variant=\"ghost\" size=\"lg\" sc-camel-on-click=\"{{ onReset }}\" hint-size=\"auto,52px\">Empecemos de nuevo<\u002Fx-import>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <sc-if value=\"{{ listening }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\"><span aria-hidden=\"true\" style=\"width:9px;height:9px;border-radius:50%;background:var(--violet);animation:aoca-mic-pulse 1.2s var(--ease) infinite\"><\u002Fspan><span style=\"font-family:var(--font-mono);font-size:12px;letter-spacing:.08em;color:var(--violet-bright)\">Escuchando…<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:12px;align-items:center\">\n            <div style=\"flex:1;display:flex;align-items:center;height:52px;padding:0 6px 0 20px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px\">\n              <input value=\"{{ inputVal }}\" sc-camel-on-change=\"{{ onInput }}\" sc-camel-on-key-down=\"{{ onKeyDown }}\" placeholder=\"Haz una pregunta o dime qué tema quieres estudiar…\" style=\"flex:1;min-width:0;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-ui);font-size:16px\">\n              <sc-if value=\"{{ micVisible }}\" hint-placeholder-val=\"{{ false }}\">\n                <button type=\"button\" sc-camel-on-click=\"{{ onMic }}\" aria-label=\"{{ micLabel }}\" style=\"{{ micStyle }}\" style-hover=\"{{ micHover }}\">\n                  <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z\"><\u002Fpath><path d=\"M5 11a7 7 0 0 0 14 0\"><\u002Fpath><path d=\"M12 18v3\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n              <\u002Fsc-if>\n              <button type=\"button\" sc-camel-on-click=\"{{ onSend }}\" disabled=\"{{ sendDisabled }}\" aria-label=\"Enviar\" style=\"{{ sendStyle }}\" style-hover=\"{{ sendHover }}\">\n                <svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#ffffff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h13\"><\u002Fpath><path d=\"M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fmain>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;arranqueModo&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;demo&quot;,&quot;live&quot;],&quot;default&quot;:&quot;demo&quot;,&quot;tsType&quot;:&quot;'demo'|'live'&quot;,&quot;section&quot;:&quot;Comportamiento&quot;},&quot;pistasPorTema&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:3,&quot;min&quot;:1,&quot;max&quot;:5,&quot;unit&quot;:&quot;pistas&quot;,&quot;section&quot;:&quot;Comportamiento&quot;},&quot;fondoAnimado&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;section&quot;:&quot;Fondo&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n\n    this.META = {\n      mate: [\n        { id: 'lineales', label: 'Ecuaciones de primer grado' },\n        { id: 'cuadraticas', label: 'Ecuaciones de segundo grado' },\n        { id: 'pitagoras', label: 'Teorema de Pitágoras' },\n        { id: 'fracciones', label: 'Fracciones' },\n      ],\n      historia: [\n        { id: 'caral', label: 'Caral' },\n        { id: 'chavin', label: 'Chavín de Huántar' },\n        { id: 'mita', label: 'La mita colonial' },\n        { id: 'independencia', label: 'La Independencia' },\n      ],\n    };\n    this.SUBJECT_NAMES = { mate: 'Matemáticas', historia: 'Historia del Perú' };\n    this.TOPIC_SUBJECT = {};\n    Object.keys(this.META).forEach((k) => this.META[k].forEach((t) => { this.TOPIC_SUBJECT[t.id] = k; }));\n\n    this.SCRIPTS = {\n      lineales: {\n        text: 'Empecemos con esta ecuación: 2x + 6 = 14. Antes de tocar nada, dime con tus palabras qué representa la x aquí.',\n        eq: '2x + 6 = 14',\n        replies: [\n          'Bien. Para dejar la x sola, fíjate qué número está sumando en ese lado y escríbeme qué operación lo cancela.',\n          'Eso es, restas 6 en ambos lados y llegas a 2x = 8; dime entre cuánto tienes que dividir para tener una sola x.',\n          'Llegaste tú a x = 4. Reemplázalo en 2x + 6 y explícame por qué el resultado confirma que es correcto.',\n        ],\n        hints: [\n          'Fíjate en el 6: está sumando, así que la operación contraria es restar. Empieza por ahí.',\n          'Aplica la misma operación en los dos lados para no romper el equilibrio y anota qué te queda a la izquierda.',\n          'Ya con 2x = 8, divide ambos lados entre el número que multiplica a la x y dime el resultado.',\n        ],\n        reformulate: 'Te lo planteo distinto: imagina una balanza donde 2x + 6 pesa igual que 14. Dime qué quitarías primero para empezar a aislar la x.',\n      },\n      cuadraticas: {\n        text: 'Mira esta ecuación: x² − 5x + 6 = 0. Antes de resolver, dime qué la diferencia de una de primer grado.',\n        eq: 'x² − 5x + 6 = 0',\n        replies: [\n          'Bien visto, aparece la x al cuadrado. Escríbeme dos números que multiplicados den 6 y sumados den −5.',\n          'De las parejas que dan 6, quédate con la que sumada da −5 y ármame los paréntesis (x … )(x … ).',\n          'Llegaste a x = 2 o x = 3. Reemplaza uno de los dos en la ecuación y explícame por qué la vuelve cero.',\n        ],\n        hints: [\n          'Busca los factores de 6 y fíjate en el signo del −5: ambos números deben ser negativos.',\n          'De las parejas que dan 6, prueba cuál sumada da −5 y descarta las demás.',\n          'Con −2 y −3 arma (x − 2)(x − 3) = 0 e iguala cada paréntesis a cero para hallar las dos x.',\n        ],\n        reformulate: 'Dicho de otro modo: necesitas partir x² − 5x + 6 en dos paréntesis que se multiplican. Dime qué dos números buscarías para lograrlo.',\n      },\n      pitagoras: {\n        text: 'Tienes un triángulo rectángulo con catetos de 3 y 4. Antes de calcular, dime cuál de los lados es la hipotenusa.',\n        eq: 'a² + b² = c²',\n        replies: [\n          'Correcto, la hipotenusa está frente al ángulo recto. Escríbeme cómo queda a² + b² usando 3 y 4.',\n          'Eso es, 9 + 16 = 25; dime qué operación te falta para pasar de 25 al valor del lado.',\n          'Llegaste tú a 5. Explícame por qué ese 5 tiene que ser el lado más largo del triángulo.',\n        ],\n        hints: [\n          'La hipotenusa es el lado opuesto al ángulo de 90°; ubícalo en tu dibujo antes de operar.',\n          'Eleva cada cateto al cuadrado por separado, 3² y 4², y súmalos; anota el total.',\n          'Ya tienes c² = 25; saca la raíz cuadrada de 25 y dime cuánto vale c.',\n        ],\n        reformulate: 'Te lo pongo distinto: los dos lados cortos, elevados al cuadrado y sumados, igualan al lado largo al cuadrado. Dime cuál sería el lado largo aquí.',\n      },\n      fracciones: {\n        text: 'Quiero sumar 1/2 + 1/3. Dime por qué no puedo sumar directo los números de arriba y los de abajo tal como están.',\n        eq: '1/2 + 1/3',\n        replies: [\n          'Exacto, los denominadores son distintos. Dime un número al que lleguen tanto el 2 como el 3.',\n          'Con 6 como denominador común, convierte cada fracción a sextos y escríbeme cómo queda 1/2.',\n          'Llegaste a 3/6 + 2/6 = 5/6. Explícame por qué el 6 se queda igual y no se suma.',\n        ],\n        hints: [\n          'Necesitas un denominador común: busca el menor número que sea múltiplo de 2 y de 3 a la vez.',\n          'Convierte cada fracción a sextos multiplicando arriba y abajo por lo mismo.',\n          'Ya en sextos, suma solo los numeradores y deja el 6 abajo; dime el resultado.',\n        ],\n        reformulate: 'Míralo así: no puedes sumar pedazos de distinto tamaño hasta partirlos igual. Dime en qué tamaño caben exactas ambas fracciones.',\n      },\n      caral: {\n        text: 'Caral es una de las ciudades más antiguas de América y no se han hallado murallas ni armas allí. Dime qué te sugiere esa ausencia sobre cómo vivían.',\n        eq: '',\n        replies: [\n          'Buena pista. Si no gastaron en defensa, dime en qué crees que invirtieron su trabajo en común y nómbrame una obra.',\n          'Vas bien con las pirámides y plazas; dime qué hace falta para levantar algo tan grande entre tanta gente.',\n          'Llegaste a que hubo una autoridad que organizaba sin guerra. Explícame qué dice eso sobre cómo se gobernaban.',\n        ],\n        hints: [\n          'Piensa qué construye una sociedad cuando no teme un ataque: obras para reunirse, no para defenderse.',\n          'En Caral destacan grandes montículos y plazas circulares hundidas; relaciónalos con actividades comunes.',\n          'Levantar pirámides exige coordinar a mucha gente; conéctalo con una autoridad que organiza en vez de conquistar.',\n        ],\n        reformulate: 'Lo planteo distinto: en Caral falta lo que sobra en una ciudad en guerra. Dime qué esperarías ver en una ciudad militar que aquí no aparece.',\n      },\n      chavin: {\n        text: 'Chavín de Huántar atraía peregrinos de lugares lejanos a su templo. Dime qué necesita tener un lugar para que gente de tan lejos viaje hasta él.',\n        eq: '',\n        replies: [\n          'Vas bien. Los pasajes oscuros y el Lanzón buscaban impresionar; dime qué sentimiento crees que provocaban en el visitante.',\n          'Eso es, asombro y temor; dime cómo esa sensación reforzaba la autoridad de los sacerdotes.',\n          'Llegaste a que el culto común unía a pueblos distintos. Explícame por qué eso fue más fuerte que un ejército.',\n        ],\n        hints: [\n          'Piensa en el poder de lo religioso: un oráculo o un dios común atrae a gente que no comparte territorio.',\n          'Los espacios estrechos y el Lanzón estaban hechos para sobrecargar los sentidos; relaciónalo con la autoridad.',\n          'Si muchos pueblos creen en el mismo culto comparten algo más fuerte que fronteras; conéctalo con la influencia de Chavín.',\n        ],\n        reformulate: 'Te lo pongo distinto: Chavín no conquistó con ejércitos sino con creencias. Dime qué ofrecía el templo para atraer a tanta gente.',\n      },\n      mita: {\n        text: 'La mita colonial obligaba a los indígenas a trabajar por turnos en las minas. Dime en qué se parece y en qué se diferencia de un empleo con sueldo de hoy.',\n        eq: '',\n        replies: [\n          'Buena distinción. Si el turno era forzado y mal pagado, dime a quién beneficiaba sobre todo ese sistema.',\n          'Vas bien; la plata de Potosí iba a la corona y a los mineros. Dime qué ponían las comunidades a cambio.',\n          'Llegaste a que las comunidades perdían gente y tierras. Explícame por qué eso marca la diferencia con un empleo de hoy.',\n        ],\n        hints: [\n          'Fíjate en la palabra “obligaba”: el trabajador no elegía ir ni cuánto cobrar. Compáralo con elegir un empleo.',\n          'Piensa quién recibía la plata extraída en Potosí y quién ponía el cuerpo en la mina.',\n          'Relaciona los turnos forzados con la pérdida de gente y tierras en las comunidades; dime una consecuencia.',\n        ],\n        reformulate: 'Dicho de otro modo: la mita movía trabajo sin voluntad ni pago justo. Dime qué la separa de alguien que hoy firma un contrato.',\n      },\n      independencia: {\n        text: 'El Perú proclamó su independencia en 1821, pero muchos siguieron viviendo casi igual. Dime qué crees que cambió y qué se mantuvo.',\n        eq: '',\n        replies: [\n          'Buena observación. Si cambió quién gobernaba pero no quién tenía la tierra, dime para quién fue más real esa independencia.',\n          'Vas bien; los cargos que dejó España los ocupó la élite criolla. Dime qué pasó mientras tanto con indígenas y esclavos.',\n          'Llegaste a que para la mayoría cambió poco. Explícame por qué se dice que fue una independencia incompleta.',\n        ],\n        hints: [\n          'Separa dos cosas: el gobierno político y la vida diaria de la mayoría; ¿cuál cambió de golpe y cuál no?',\n          'Piensa quiénes ocuparon los cargos que dejó España y mira su origen social.',\n          'La esclavitud y el tributo indígena siguieron años después de 1821; dime qué revela eso sobre el alcance del cambio.',\n        ],\n        reformulate: 'Míralo así: firmar una independencia no reparte de nuevo la tierra ni el poder. Dime quiénes seguían mandando y quiénes seguían abajo tras 1821.',\n      },\n    };\n\n    this.CLOSING = 'Ya lo tienes. Cuéntame con tus palabras qué fue lo que te hizo llegar a la respuesta.';\n    this.EXHAUSTED = 'Ya no puedo darte más pistas sin resolverlo por ti. Escríbeme lo que tienes hasta ahora, aunque esté a medias.';\n    this.ERROR_MSG = 'No pude conectarme. Cambia a Modo Demo para continuar.';\n\n    let nombre = 'Oriana', nombreCompleto = 'Oriana C.';\n    try {\n      const sc = sessionStorage.getItem('aoca_nombre_completo');\n      const s = sessionStorage.getItem('aoca_nombre');\n      if (sc) { nombreCompleto = sc; nombre = sc.trim().split(/\\s+/)[0]; }\n      else if (s) { nombre = s.trim().split(/\\s+/)[0]; nombreCompleto = s; }\n    } catch (e) {}\n\n    const SR = (typeof window !== 'undefined') && (window.SpeechRecognition || window.webkitSpeechRecognition);\n    this.sttSupported = !!SR;\n    this.ttsSupported = (typeof window !== 'undefined') && ('speechSynthesis' in window);\n\n    this.state = {\n      nombre, nombreCompleto,\n      modo: props.arranqueModo === 'live' ? 'live' : 'demo',\n      subjectKey: 'mate',\n      started: false,\n      topicId: null,\n      topicLabel: '',\n      messages: [],\n      typing: false,\n      studentSentOnce: false,\n      hintsLeft: props.pistasPorTema != null ? props.pistasPorTema : 3,\n      stepIndex: 0,\n      answeredCorrect: false,\n      progress: 15,\n      inputVal: '',\n      a11yOpen: false,\n      readAloud: false,\n      voiceInput: this.sttSupported,\n      easyRead: false,\n      reduceMotion: false,\n      listening: false,\n      speakingIdx: null,\n      na
